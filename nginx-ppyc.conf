# Upstream block pointing to your Rails/Puma (using TCP port 3000)
upstream ppyc_backend {
  server 127.0.0.1:3000;
}

server {
  listen 80;
  server_name ppyc1910.org www.ppyc1910.org srv894370.hstgr.cloud; # Support both permanent and temporary domains

  # The root directory is your REACT APP's BUILD FOLDER
  root /var/www/ppyc/ppyc_frontend/dist;
  index index.html;

  # Increase max body size for file uploads (images up to 10MB, videos up to 100MB)
  client_max_body_size 100M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    application/x-font-ttf
    font/opentype;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Handle CORS preflight OPTIONS requests first
  location /api/ {
    # Increase max body size for file uploads in API location
    client_max_body_size 100M;

    # Handle preflight OPTIONS requests
    if ($request_method = 'OPTIONS') {
      add_header 'Access-Control-Allow-Origin' '$http_origin' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD' always;
      add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization, X-Requested-With' always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      add_header 'Access-Control-Max-Age' 86400 always;
      add_header 'Content-Length' 0;
      add_header 'Content-Type' 'text/plain';
      return 204;
    }

    # Proxy all other API requests to Rails backend
    proxy_pass http://ppyc_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeout settings for large file uploads
    proxy_connect_timeout 120s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
  }

  # Handle assets directory specifically (Vite build output) - MUST come first
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Serve uploaded CMS images/videos from Rails public/uploads/
  location /uploads/ {
    alias /var/www/ppyc/ppyc_backend/public/uploads/;
    expires 30d;
    add_header Cache-Control "public";
    add_header Vary "Accept-Encoding";
    access_log off;
  }

  # Cache static images, fonts, and videos (must come before location /)
  location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Cache video files with range request support for seeking
  location ~* \.(mp4|webm|ogg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Accept-Ranges bytes;
    try_files $uri =404;
  }

  # Location block for all other requests (your React app)
  # This makes sure React Router works correctly on page reloads
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }
}
